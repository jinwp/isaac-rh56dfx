# RH56DFX initial physics defaults for Isaac Lab.
#
# These values are seeded from the documented RH56DFX timing, command-space,
# and force-capability constraints, but they are still an identification
# starting point rather than vendor-provided ground truth.

[sim]
physics_dt = 0.0020833333333333333  # 1 / 480 s
action_decimation = 3               # ~160 Hz control updates, close to the 163 Hz paper setup

[sim.physx]
enable_ccd = false
bounce_threshold_velocity = 0.05
friction_offset_threshold = 0.01
friction_correlation_distance = 0.003
max_position_iteration_count = 32
max_velocity_iteration_count = 16

[materials]
static_friction = 1.1
dynamic_friction = 0.95
restitution = 0.0
friction_combine_mode = "multiply"
restitution_combine_mode = "min"

[collision]
contact_offset = 0.002
rest_offset = 0.0

[articulation]
solver_position_iteration_count = 24
solver_velocity_iteration_count = 8
max_depenetration_velocity = 1.5
enable_gyroscopic_forces = true
enable_self_collisions = true
import_self_collision = true
collider_type = "convex_decomposition"

[actuation]
latency_s = 0.066
latency_jitter_s = 0.006

[actuator.mount]
stiffness = 250.0
damping = 25.0
effort_limit_sim = 25.0
velocity_limit_sim = 4.0
armature = 0.01
friction = 0.02
dynamic_friction = 0.0
viscous_friction = 0.01

[actuator.fingers]
stiffness = 2.8
damping = 0.08
effort_limit = 0.55
effort_limit_sim = 0.55
saturation_effort = 0.85
velocity_limit = 2.2
velocity_limit_sim = 2.2
armature = 0.0035
friction = 0.05
dynamic_friction = 0.02
viscous_friction = 0.02

[actuator.thumb_bend]
stiffness = 3.2
damping = 0.10
effort_limit = 0.75
effort_limit_sim = 0.75
saturation_effort = 1.05
velocity_limit = 2.0
velocity_limit_sim = 2.0
armature = 0.004
friction = 0.06
dynamic_friction = 0.025
viscous_friction = 0.025

[actuator.thumb_rotation]
stiffness = 3.6
damping = 0.12
effort_limit = 0.65
effort_limit_sim = 0.65
saturation_effort = 0.95
velocity_limit = 1.8
velocity_limit_sim = 1.8
armature = 0.0045
friction = 0.06
dynamic_friction = 0.025
viscous_friction = 0.025
